name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (zigbuild for better glibc compatibility)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true
          # Linux ARM64 (zigbuild for better glibc compatibility)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_zigbuild: true
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cargo-zigbuild for Linux targets (better glibc compatibility)
      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build with zigbuild (Linux)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build with cargo (macOS)
        if: ${{ !matrix.use_zigbuild }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package for GitHub Release
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../agent-terminal-${{ matrix.target }}.${{ matrix.archive }} agent-terminal
          cd ../../..

      # Generate shell completions from native builds only (completions are arch-independent)
      - name: Generate shell completions
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir -p completions
          BINARY=target/${{ matrix.target }}/release/agent-terminal
          $BINARY completions bash > completions/agent-terminal
          $BINARY completions zsh > completions/_agent-terminal
          $BINARY completions fish > completions/agent-terminal.fish

      - name: Upload completions artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: agent-terminal-completions
          path: completions/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-terminal-${{ matrix.target }}
          path: agent-terminal-${{ matrix.target }}.${{ matrix.archive }}

  verify-binaries:
    name: Verify Binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify release tarballs and completions exist and are valid
        run: |
          echo "=== Artifact structure ==="
          find artifacts -type f | head -20

          EXPECTED_TARBALLS=(
            "agent-terminal-x86_64-unknown-linux-gnu/agent-terminal-x86_64-unknown-linux-gnu.tar.gz"
            "agent-terminal-aarch64-unknown-linux-gnu/agent-terminal-aarch64-unknown-linux-gnu.tar.gz"
            "agent-terminal-x86_64-apple-darwin/agent-terminal-x86_64-apple-darwin.tar.gz"
            "agent-terminal-aarch64-apple-darwin/agent-terminal-aarch64-apple-darwin.tar.gz"
          )

          EXPECTED_COMPLETIONS=(
            "agent-terminal-completions/agent-terminal"
            "agent-terminal-completions/_agent-terminal"
            "agent-terminal-completions/agent-terminal.fish"
          )

          MIN_TARBALL_SIZE=100000
          MIN_COMPLETION_SIZE=10
          ERRORS=0

          echo ""
          echo "=== Checking release tarballs ==="
          for tarball in "${EXPECTED_TARBALLS[@]}"; do
            path="artifacts/$tarball"
            if [ ! -f "$path" ]; then
              echo "ERROR: Missing $path"
              ERRORS=$((ERRORS + 1))
            else
              SIZE=$(stat -c%s "$path" 2>/dev/null || stat -f%z "$path")
              if [ "$SIZE" -lt "$MIN_TARBALL_SIZE" ]; then
                echo "ERROR: $path is too small ($SIZE bytes, expected >= $MIN_TARBALL_SIZE)"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: $path ($SIZE bytes)"
              fi
            fi
          done

          echo ""
          echo "=== Checking shell completions ==="
          for completion in "${EXPECTED_COMPLETIONS[@]}"; do
            path="artifacts/$completion"
            if [ ! -f "$path" ]; then
              echo "ERROR: Missing $path"
              ERRORS=$((ERRORS + 1))
            else
              SIZE=$(stat -c%s "$path" 2>/dev/null || stat -f%z "$path")
              if [ "$SIZE" -lt "$MIN_COMPLETION_SIZE" ]; then
                echo "ERROR: $path is too small ($SIZE bytes, expected >= $MIN_COMPLETION_SIZE)"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: $path ($SIZE bytes)"
              fi
            fi
          done

          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS artifact issues found"
            exit 1
          fi
          echo "SUCCESS: All 4 release tarballs and shell completions are present and valid"

  release:
    name: Create Release
    needs: verify-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-terminal-*
          path: artifacts

      - name: Package completions
        run: |
          cd artifacts/agent-terminal-completions
          tar -czvf ../agent-terminal-completions.tar.gz agent-terminal _agent-terminal agent-terminal.fish
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
